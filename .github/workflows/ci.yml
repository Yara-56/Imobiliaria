name: CI

on:
  pull_request:
    branches: [ main ]

  push:
    branches: [ main, develop ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      # Versão do pnpm vem só de package.json (packageManager). Não definir "version" aqui — o action-setup v4 falha se houver duplicado.
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm run lint --if-present

      - name: Run tests
        run: pnpm test --if-present

      - name: Build project
        run: pnpm run build
